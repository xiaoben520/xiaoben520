<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" viewBox="0 0 780 320" role="img" aria-labelledby="title description">
  <title id="title">Languages in xiaoben520's public GitHub projects</title>
  <desc id="description">A donut chart showing the language composition of xiaoben520's public GitHub projects across 3 repositories, measured in bytes of code.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; }
    .title { font-size: 18px; font-weight: 600; fill: #1f2328; }
    .percentage { font-size: 12px; fill: #656d76; }
    .language { font-size: 14px; font-weight: 600; fill: #1f2328; }
    .count { font-size: 30px; font-weight: 700; fill: #1f2328; }
    .empty { font-size: 13px; fill: #656d76; }
    .track { stroke: #d0d7de; }
    @media (prefers-color-scheme: dark) {
      .title, .language, .count { fill: #f0f6fc; }
      .percentage, .empty { fill: #8b949e; }
      .track { stroke: #30363d; }
    }
  </style>
  <text x="24" y="32" class="title">Coding Profile · Public Project Languages</text>
  <g transform="rotate(-90 180 180)">
    <circle class="track" cx="180" cy="180" r="95" fill="none" stroke-width="32" />
    <circle cx="180" cy="180" r="95" fill="none" stroke="#178600" stroke-width="32" stroke-dasharray="583.030 13.873" stroke-dashoffset="0.000" />
    <circle cx="180" cy="180" r="95" fill="none" stroke="#f1e05a" stroke-width="32" stroke-dasharray="8.928 587.975" stroke-dashoffset="-585.030" />
    <circle cx="180" cy="180" r="95" fill="none" stroke="#e34c26" stroke-width="32" stroke-dasharray="0.000 596.903" stroke-dashoffset="-595.957" />
  </g>
  <text x="180" y="174" text-anchor="middle" class="count">3</text>
  <text x="180" y="196" text-anchor="middle" class="percentage">languages</text>
  <g transform="translate(345 75)"><circle cx="7" cy="-5" r="6" fill="#178600" /><text x="22" class="language">C#</text><text x="22" y="17" class="percentage">98.0% · 457.6 kB</text></g>
  <g transform="translate(345 119)"><circle cx="7" cy="-5" r="6" fill="#f1e05a" /><text x="22" class="language">JavaScript</text><text x="22" y="17" class="percentage">1.8% · 8.5 kB</text></g>
  <g transform="translate(345 163)"><circle cx="7" cy="-5" r="6" fill="#e34c26" /><text x="22" class="language">HTML</text><text x="22" y="17" class="percentage">0.2% · 757 B</text></g>
</svg>