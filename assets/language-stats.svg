<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" viewBox="0 0 780 320" role="img" aria-labelledby="title description">
  <title id="title">Top languages in xiaoben520's public repositories</title>
  <desc id="description">A donut chart showing up to ten languages, measured by code size.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2328; }
    .title { font-size: 20px; font-weight: 650; }
    .subtitle, .percentage { font-size: 12px; fill: #656d76; }
    .language { font-size: 14px; font-weight: 600; }
    .count { font-size: 30px; font-weight: 700; }
    .empty { font-size: 13px; fill: #656d76; }
    @media (prefers-color-scheme: dark) {
      text { fill: #f0f6fc; }
      .subtitle, .percentage, .empty { fill: #8b949e; }
      .track { stroke: #30363d; }
    }
  </style>
  <text x="24" y="32" class="title">Top Languages</text>
  <text x="24" y="52" class="subtitle">Public, non-fork repositories · up to 10 languages</text>
  <g transform="rotate(-90 160 160)">
    <circle class="track" cx="160" cy="160" r="86" fill="none" stroke="#d0d7de" stroke-width="34" />
    <circle cx="160" cy="160" r="86" fill="none" stroke="#178600" stroke-width="34" stroke-dasharray="539.482 0.872" stroke-dashoffset="-0.000" />
    <circle cx="160" cy="160" r="86" fill="none" stroke="#e34c26" stroke-width="34" stroke-dasharray="0.872 539.482" stroke-dashoffset="-539.482" />
  </g>
  
  <text x="160" y="154" text-anchor="middle" class="count">2</text>
  <text x="160" y="176" text-anchor="middle" class="subtitle">languages</text>
  <g transform="translate(315 91)"><circle cx="7" cy="-5" r="6" fill="#178600" /><text x="22" class="language">C#</text><text x="22" y="17" class="percentage">99.8%</text></g>
    <g transform="translate(315 131)"><circle cx="7" cy="-5" r="6" fill="#e34c26" /><text x="22" class="language">HTML</text><text x="22" y="17" class="percentage">0.16%</text></g>
</svg>
